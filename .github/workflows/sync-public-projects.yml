name: Build site content

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "content/**"
      - "scripts/build-content.mjs"
      - ".github/workflows/sync-public-projects.yml"
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: build-site-content
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build Markdown content and sync public repositories
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit changed generated pages
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html projects blog notes assets/data/search-index.json sitemap.xml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Sync public project visibility"
          git push
